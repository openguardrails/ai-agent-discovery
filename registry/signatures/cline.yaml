# Cline Detection Signatures
id: cline
name: Cline Signatures
version: "1.0.0"
author: community
description: Detection patterns for Cline VS Code extension

patterns:
  process:
    - pattern: "cline"
      type: substring
      case_sensitive: false
      fields: [file_path, command_line]

    - pattern: "claude-dev"
      type: substring
      case_sensitive: false
      fields: [file_path, command_line]

  file_path:
    - pattern: "cline"
      type: substring

    - pattern: ".vscode/extensions/.*cline"
      type: regex

    - pattern: "claude-dev"
      type: substring

exclusions:
  processes:
    - chrome
    - firefox
  paths:
    - /tmp/
